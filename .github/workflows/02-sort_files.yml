name: 📝 2-Sort orphan files

on:
  workflow_dispatch:

jobs:
  sort:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sort only ungrouped files
        run: |
          cd downloads || exit 0
          
          # Get folders that already exist
          existing_folders=$(ls -d */ 2>/dev/null | sed 's|/||g')
          
          for file in *; do
            if [[ -f "$file" ]]; then
              # Try to extract base name
              base="${file%.zip}"
              base="${base%.z[0-9]*}"
              base="${base%.deb}"
              base="${base%.part}"
              
              # Only create folder if:
              # 1. Base name is different from filename
              # 2. Folder doesn't already exist
              # 3. Base name isn't already a folder
              if [[ "$base" != "$file" ]] && [[ ! -d "$base" ]] && [[ ! " $existing_folders " =~ " $base " ]]; then
                echo "📁 Creating folder and moving: $base"
                mkdir -p "$base"
                mv "${base}"* "$base"/ 2>/dev/null || true
              fi
            fi
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add downloads/
          git diff --staged --quiet || (git commit -m "[AVASAM] Sort orphan files [skip ci]" && git push)
